<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <g transform="translate(50,67) rotate(20) scale(1,0.78) translate(-50,-67)">
    <!-- outer green rind: two perfect elliptical arcs -->
    <path d="M8,36 L92,36 A42,54 0 0,1 50,90 A42,54 0 0,1 8,36 Z" fill="#2e9e3a"/>
    <!-- light inner rind strip -->
    <path d="M13,36 L87,36 A37,48 0 0,1 50,84 A37,48 0 0,1 13,36 Z" fill="#d4f5a0"/>
    <!-- red flesh -->
    <path d="M18,36 L82,36 A32,42 0 0,1 50,78 A32,42 0 0,1 18,36 Z" fill="#f52045"/>
    <!-- highlight -->
    <ellipse cx="36" cy="52" rx="10" ry="7" fill="#ff6070" opacity="0.35" transform="rotate(-10 36 52)"/>
    <!-- seeds -->
    <ellipse cx="50" cy="64" rx="3" ry="4.5" fill="#111122"/>
    <ellipse cx="34" cy="68" rx="2.5" ry="4" fill="#111122" transform="rotate(-20 34 68)"/>
    <ellipse cx="66" cy="68" rx="2.5" ry="4" fill="#111122" transform="rotate(20 66 68)"/>
    <ellipse cx="40" cy="53" rx="2.2" ry="3.5" fill="#111122" transform="rotate(-10 40 53)"/>
    <ellipse cx="60" cy="53" rx="2.2" ry="3.5" fill="#111122" transform="rotate(10 60 53)"/>
  </g>
</svg>
